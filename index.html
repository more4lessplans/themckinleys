<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Micah McKinley</title>
  <meta name="description" content="Digital experiences designed with precision." />
  <meta name="theme-color" content="#ffffff" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #fff; color: #111; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
    * { cursor: none !important; }
    ::selection { background: #111; color: #fff; }
    :focus-visible { outline: 1px solid #111; outline-offset: 4px; }

    /* Cursor */
    #cursor-ring { position: fixed; width: 28px; height: 28px; border-radius: 50%; border: 1px solid rgba(17,17,17,0.3); pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); transition: width 0.3s, height 0.3s, border-color 0.3s, opacity 0.3s; opacity: 0; }
    #cursor-dot { position: fixed; width: 4px; height: 4px; border-radius: 50%; background: #111; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); transition: opacity 0.3s; opacity: 0; }
    body.cursor-active #cursor-ring, body.cursor-active #cursor-dot { opacity: 1; }
    body.cursor-hover #cursor-ring { width: 56px; height: 56px; border-color: rgba(17,17,17,0.18); }

    /* Rules */
    .rule-top, .rule-bottom { position: fixed; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, #EAEAEA 20%, #EAEAEA 80%, transparent); z-index: 10; }
    .rule-top { top: 0; }
    .rule-bottom { bottom: 0; }

    /* Header */
    header { position: fixed; top: 0; left: 0; right: 0; padding: 28px 40px; display: flex; align-items: center; justify-content: space-between; z-index: 10; }
    .name { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; font-weight: 400; letter-spacing: 0.18em; color: #111; text-transform: lowercase; opacity: 0.65; }
    .avail { display: flex; align-items: center; gap: 7px; }
    .avail-dot { width: 5px; height: 5px; border-radius: 50%; background: #5a8a6a; display: block; animation: pulse 2.8s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 0.35; } 50% { opacity: 0.85; } }
    .avail-text { font-family: 'Inter', system-ui, sans-serif; font-size: 10px; font-weight: 400; letter-spacing: 0.14em; color: #5a8a6a; text-transform: lowercase; opacity: 0.8; }

    /* Main */
    main { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 5; }
    .hero { text-align: center; max-width: 720px; padding: 0 32px; }
    .eyebrow { font-family: 'Inter', system-ui, sans-serif; font-size: 10px; font-weight: 400; letter-spacing: 0.22em; text-transform: uppercase; color: #8B7355; opacity: 0.85; margin-bottom: 36px; display: block; }
    h1 { font-family: 'Inter', system-ui, sans-serif; font-size: clamp(44px, 7.5vw, 90px); font-weight: 300; letter-spacing: -0.035em; line-height: 1.06; color: #111; margin: 0; }
    h1 em { font-style: italic; opacity: 0.38; }
    .divider { width: 28px; height: 1px; background: #EAEAEA; margin: 40px auto; }
    .subtext { font-family: 'Inter', system-ui, sans-serif; font-size: clamp(14px, 1.5vw, 16px); font-weight: 300; letter-spacing: 0.005em; line-height: 1.75; color: #111; opacity: 0.4; }
    .cta-wrap { margin-top: 52px; }
    .cta {
      display: inline-flex; align-items: center; gap: 10px;
      font-family: 'Inter', system-ui, sans-serif; font-size: 12px; font-weight: 400;
      letter-spacing: 0.1em; text-transform: uppercase; color: #111;
      background: transparent; border: 1px solid #DDDDD5;
      padding: 15px 34px; border-radius: 2px; text-decoration: none;
      transition: all 0.38s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .cta:hover { background: #111; color: #fff; border-color: #111; }
    .cta-arrow { display: inline-block; font-size: 12px; transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1); }
    .cta:hover .cta-arrow { transform: translateX(4px); }

    /* Footer */
    footer { position: fixed; bottom: 0; left: 0; right: 0; padding: 22px 40px; display: flex; align-items: center; justify-content: space-between; z-index: 10; }
    .footer-text { font-family: 'Inter', system-ui, sans-serif; font-size: 10px; font-weight: 400; letter-spacing: 0.16em; color: #111; opacity: 0.28; text-transform: lowercase; }

    /* Ambient gradients */
    .ambient { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
    .blob { position: absolute; border-radius: 50%; filter: blur(70px); }
    .blob-1 { top: -20%; left: -10%; width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(139,115,85,0.055) 0%, transparent 70%); animation: blob1 18s ease-in-out infinite; }
    .blob-2 { bottom: -15%; right: -10%; width: 45vw; height: 45vw; background: radial-gradient(circle, rgba(17,17,17,0.028) 0%, transparent 70%); animation: blob2 22s ease-in-out infinite 4s; }
    .blob-3 { top: 30%; left: 25%; width: 50vw; height: 30vw; background: radial-gradient(circle, rgba(139,115,85,0.022) 0%, transparent 70%); animation: blob3 14s ease-in-out infinite 2s; }
    @keyframes blob1 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(18px,-12px) scale(1.04); } }
    @keyframes blob2 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-14px,10px) scale(1.03); } }
    @keyframes blob3 { 0%,100% { opacity:0.6; transform: scale(1); } 50% { opacity:1; transform: scale(1.05); } }

    /* Page-load reveal */
    .reveal { opacity: 0; transform: translateY(18px); filter: blur(4px); }
    .reveal.in { animation: revealIn 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .fade { opacity: 0; }
    .fade.in { animation: fadeIn 1.2s ease-out forwards; }
    @keyframes revealIn { to { opacity: 1; transform: translateY(0); filter: blur(0); } }
    @keyframes fadeIn { to { opacity: 1; } }

    /* Responsive */
    @media (max-width: 600px) {
      header { padding: 22px 24px; }
      footer { padding: 18px 24px; }
      .hero { padding: 0 24px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .blob, .avail-dot { animation: none; }
      .reveal.in, .fade.in { animation: none; opacity: 1; transform: none; filter: none; }
    }
  </style>
</head>
<body>
  <!-- Custom cursor -->
  <div id="cursor-ring" aria-hidden="true"></div>
  <div id="cursor-dot" aria-hidden="true"></div>

  <!-- Ambient blobs -->
  <div class="ambient" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- Rules -->
  <div class="rule-top fade" aria-hidden="true"></div>
  <div class="rule-bottom fade" aria-hidden="true"></div>

  <!-- Header -->
  <header class="fade">
    <span class="name">micah mckinley</span>
    <div class="avail" aria-label="Currently available for projects">
      <span class="avail-dot" aria-hidden="true"></span>
      <span class="avail-text">available</span>
    </div>
  </header>

  <!-- Main -->
  <main role="main" id="main-content">
    <div class="hero" id="parallax-layer">
      <span class="eyebrow reveal" style="animation-delay:0.35s">Web Design &amp; Development</span>
      <h1 class="reveal" style="animation-delay:0.5s" id="headline">
        Digital experiences<br><em>designed with precision.</em>
      </h1>
      <div class="divider reveal" style="animation-delay:0.65s" aria-hidden="true"></div>
      <p class="subtext reveal" style="animation-delay:0.75s">
        I build websites that feel effortless — every pixel,<br>interaction, and moment intentional.
      </p>
      <div class="cta-wrap reveal" style="animation-delay:0.9s">
        <a href="#" class="cta" id="contact-link" aria-label="Start a project — opens email client">
          Start a project
          <span class="cta-arrow" aria-hidden="true">→</span>
        </a>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="fade" style="animation-delay:1.1s">
    <span class="footer-text">toronto, canada</span>
    <span class="footer-text" style="text-transform:none;letter-spacing:0.1em;">© <span id="yr"></span></span>
  </footer>

  <script>
    // Year
    document.getElementById('yr').textContent = new Date().getFullYear();

    // Bot-proof email — assembled only on click, never in DOM
    document.getElementById('contact-link').addEventListener('click', function(e) {
      e.preventDefault();
      var p = ['\x64\x65\x76', '\x40', '\x74\x68\x65\x6d\x63\x6b\x69\x6e\x6c\x65\x79\x73', '\x2e\x63\x61'];
      window.location.href = 'mailto:' + p.join('') + '?subject=Project%20Inquiry';
    });

    // Page-load reveal
    (function() {
      var reveals = document.querySelectorAll('.reveal');
      var fades = document.querySelectorAll('.fade');
      fades.forEach(function(el) { el.classList.add('in'); });
      reveals.forEach(function(el) {
        var delay = el.style.animationDelay || '0s';
        setTimeout(function() { el.classList.add('in'); }, parseFloat(delay) * 1000);
      });
    })();

    // Custom cursor
    var ring = document.getElementById('cursor-ring');
    var dot = document.getElementById('cursor-dot');
    var body = document.body;
    var rx = -100, ry = -100, cx = -100, cy = -100;
    var tx = -100, ty = -100;

    document.addEventListener('mousemove', function(e) {
      tx = e.clientX; ty = e.clientY;
      body.classList.add('cursor-active');
    });

    document.addEventListener('mouseover', function(e) {
      if (e.target && e.target.closest('a, button')) {
        body.classList.add('cursor-hover');
      }
    });
    document.addEventListener('mouseout', function(e) {
      if (e.target && !e.target.closest('a, button')) {
        body.classList.remove('cursor-hover');
      }
    });
    document.addEventListener('mouseleave', function() { body.classList.remove('cursor-active'); });

    // Smooth cursor follow
    function lerp(a, b, n) { return a + (b - a) * n; }
    function tick() {
      rx = lerp(rx, tx, 0.12);
      ry = lerp(ry, ty, 0.12);
      cx = lerp(cx, tx, 0.7);
      cy = lerp(cy, ty, 0.7);
      ring.style.left = rx + 'px';
      ring.style.top = ry + 'px';
      dot.style.left = cx + 'px';
      dot.style.top = cy + 'px';
      requestAnimationFrame(tick);
    }
    tick();

    // Parallax
    var layer = document.getElementById('parallax-layer');
    var headline = document.getElementById('headline');
    var mx = 0, my = 0, px = 0, py = 0, hx = 0, hy = 0;

    window.addEventListener('mousemove', function(e) {
      mx = (e.clientX - window.innerWidth / 2) * 0.014;
      my = (e.clientY - window.innerHeight / 2) * 0.014;
    });

    function parallaxTick() {
      px = lerp(px, mx, 0.06);
      py = lerp(py, my, 0.06);
      hx = lerp(hx, mx * 0.5, 0.06);
      hy = lerp(hy, my * 0.5, 0.06);
      layer.style.transform = 'translate3d(' + px + 'px,' + py + 'px,0)';
      headline.style.transform = 'translate3d(' + hx + 'px,' + hy + 'px,0)';
      requestAnimationFrame(parallaxTick);
    }
    parallaxTick();
  </script>
</body>
</html>
